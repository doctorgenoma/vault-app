<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <!-- FIX responsive: viewport sin maximum-scale para no bloquear zoom de accesibilidad -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0A0D14" />

    <!-- PWA iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="VAULT" />
    <meta name="mobile-web-app-capable" content="yes" />

    <meta name="description" content="Bóveda de contraseñas cifrada con AES-256-GCM" />

    <!-- FIX PWA iOS: manifest con ruta relativa, no absoluta -->
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" type="image/svg+xml" href="icon.svg" />
    <!-- FIX: apple-touch-icon apunta al SVG (funciona en iOS 15+) -->
    <link rel="apple-touch-icon" href="icon.svg" />

    <title>VAULT — Bóveda Segura</title>

    <style>
      /* Evita flash blanco al cargar en iOS */
      html, body { background: #0A0D14; margin: 0; padding: 0; height: 100%; }
      #root { height: 100%; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
